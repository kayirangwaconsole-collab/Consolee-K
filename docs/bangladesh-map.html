<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangladesh: Economic & Population Hubs</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bd-green: #006a4e;
            --bd-red: #f42a41;
            --dark-bg: #05080a;
            --card-bg: #0f1715;
            --accent-gold: #fbbf24;
            --accent-blue: #38bdf8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--dark-bg);
            color: #f8fafc;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: rgba(0, 106, 78, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-bottom: 1px solid rgba(244, 42, 65, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
        .header h1 span { color: var(--bd-red); }
        
        .controls {
            display: flex;
            background: rgba(255,255,255,0.05);
            padding: 4px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .toggle-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .toggle-btn.active {
            background: var(--bd-green);
            color: white;
            box-shadow: 0 4px 12px rgba(0, 106, 78, 0.3);
        }

        .toggle-btn:hover:not(.active) {
            background: rgba(255,255,255,0.08);
            color: #f8fafc;
        }
        
        .main-container { flex: 1; display: flex; position: relative; }
        
        #map { flex: 1; height: 100%; background: var(--dark-bg); }
        
        .info-panel {
            width: 380px;
            background: var(--card-bg);
            border-left: 1px solid #1e2925;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #64748b;
            margin-bottom: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-box {
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-box small { display: block; font-size: 10px; color: #94a3b8; }
        .stat-box span { font-size: 16px; font-weight: 700; color: var(--accent-gold); }

        .location-list { display: flex; flex-direction: column; gap: 8px; }

        .loc-item {
            padding: 12px;
            background: rgba(255,255,255,0.02);
            border: 1px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .loc-item:hover {
            background: rgba(16, 185, 129, 0.05);
            border-color: var(--bd-green);
        }

        .loc-item h4 { font-size: 14px; margin-bottom: 2px; }
        .loc-item p { font-size: 11px; color: #94a3b8; }

        /* Tooltip & Popup */
        .custom-popup .leaflet-popup-content-wrapper {
            background: #0f172a;
            color: white;
            border-radius: 12px;
            padding: 5px;
        }

        .data-label {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            margin-right: 5px;
        }

        @media (max-width: 900px) {
            .info-panel { width: 300px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>BANGLADESH <span>DATA</span> INSIGHTS</h1>
        <div class="controls">
            <button class="toggle-btn active" id="pop-btn" onclick="setView('population')">Population</button>
            <button class="toggle-btn" id="econ-btn" onclick="setView('economic')">Economic</button>
        </div>
        <div style="font-size: 12px; color: #94a3b8;" class="header-subtitle">Census 2022 & EPZ Data</div>
    </div>
    
    <div class="main-container">
        <div id="map"></div>
        <div class="info-panel">
            <div id="summary-section">
                <div class="section-title">National Summary</div>
                <div class="stats-grid">
                    <div class="stat-box">
                        <small>Avg Density</small>
                        <span id="stat-1">1,119/km²</span>
                    </div>
                    <div class="stat-box">
                        <small>Active EPZs</small>
                        <span id="stat-2">8 Major</span>
                    </div>
                </div>
            </div>

            <div>
                <div class="section-title">Key Locations</div>
                <div class="location-list" id="location-list"></div>
            </div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    
    <script>
        let currentView = 'population';
        const markers = [];

        const map = L.map('map', {
            zoomControl: false
        }).setView([23.8, 90.3], 7);

        L.control.zoom({ position: 'bottomleft' }).addTo(map);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CARTO'
        }).addTo(map);
        
        const data = [
            { name: "Dhaka", type: "Capital", coords: [23.8103, 90.4125], density: 4418, econ: "Very High", desc: "Highest density zone globally. Major industrial cluster." },
            { name: "Chattogram", type: "Port City", coords: [22.3569, 91.7832], density: 1100, econ: "High", desc: "Economic gateway. Handles 90% of export-import trade." },
            { name: "Gazipur", type: "Economic Hub", coords: [24.0, 90.42], density: 2500, econ: "Very High", desc: "The 'Engine Room' of the RMG sector." },
            { name: "Sylhet", type: "Division", coords: [24.8949, 91.8687], density: 890, econ: "Medium", desc: "Center of Tea industry and remittance flow." },
            { name: "Khulna", type: "Division", coords: [22.8456, 89.5403], density: 800, econ: "Medium", desc: "Gateway to Mongla Port and the Sundarbans." },
            { name: "Ishwardi", type: "EPZ", coords: [24.1274, 89.1190], density: 950, econ: "High", desc: "Strategic western export processing zone." },
            { name: "Comilla", type: "EPZ/Hub", coords: [23.4607, 91.1809], density: 1600, econ: "High", desc: "One of the most productive EPZs in the country." },
            { name: "Uttara (Nilphamari)", type: "EPZ", coords: [25.8450, 88.8443], density: 1050, econ: "High", desc: "Transforming the northern economy via manufacturing." }
        ];

        function getStyle(loc) {
            if (currentView === 'population') {
                return {
                    radius: Math.sqrt(loc.density) / 1.5,
                    fillColor: "#38bdf8",
                    color: "#fff",
                    weight: 1,
                    opacity: 1,
                    fillOpacity: 0.5
                };
            } else {
                const color = loc.econ === "Very High" ? "#f42a41" : (loc.econ === "High" ? "#fbbf24" : "#10b981");
                return {
                    radius: 12,
                    fillColor: color,
                    color: "#fff",
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.8
                };
            }
        }

        function renderMarkers() {
            markers.forEach(m => map.removeLayer(m));
            markers.length = 0;

            data.forEach(loc => {
                const style = getStyle(loc);
                const marker = L.circleMarker(loc.coords, style).addTo(map);
                
                const color = loc.econ === "Very High" ? "#f42a41" : (loc.econ === "High" ? "#fbbf24" : "#10b981");
                const popupContent = `
                    <div style="font-family: inherit; width: 220px;">
                        <b style="font-size: 16px; color: ${currentView === 'population' ? '#38bdf8' : color}">${loc.name}</b><br/>
                        <div style="margin: 8px 0;">
                            <span class="data-label" style="background: rgba(255,255,255,0.1)">${loc.type}</span>
                        </div>
                        <div style="font-size: 12px; line-height: 1.4; color: #cbd5e1;">
                            <b>${currentView === 'population' ? 'Density' : 'Econ Status'}:</b> 
                            ${currentView === 'population' ? loc.density + '/km²' : loc.econ}<br/>
                            <p style="margin-top: 5px;">${loc.desc}</p>
                        </div>
                    </div>
                `;
                marker.bindPopup(popupContent, { className: 'custom-popup' });
                markers.push(marker);
            });
        }

        function setView(view) {
            currentView = view;
            document.getElementById('pop-btn').classList.toggle('active', view === 'population');
            document.getElementById('econ-btn').classList.toggle('active', view === 'economic');
            
            // Update Summary stats
            if (view === 'population') {
                document.getElementById('stat-1').innerText = '1,119/km²';
                document.getElementById('stat-2').innerText = '8 Major';
                document.getElementById('stat-1').previousElementSibling.innerText = 'Avg Density';
                document.getElementById('stat-2').previousElementSibling.innerText = 'Active EPZs';
            } else {
                document.getElementById('stat-1').innerText = 'USD 45B+';
                document.getElementById('stat-2').innerText = 'Top 2';
                document.getElementById('stat-1').previousElementSibling.innerText = 'Export Value';
                document.getElementById('stat-2').previousElementSibling.innerText = 'RM World Rank';
            }

            renderMarkers();
        }

        const listContainer = document.getElementById('location-list');
        data.forEach((loc, index) => {
            const item = document.createElement('div');
            item.className = 'loc-item';
            item.innerHTML = `
                <h4>${loc.name}</h4>
                <p>${loc.type}</p>
            `;
            item.onclick = () => {
                map.flyTo(loc.coords, 10);
                markers[index].openPopup();
            };
            listContainer.appendChild(item);
        });

        renderMarkers();
    </script>
</body>
</html>
